server:
  port: 8080

logging:
  level:
    com.factify.backend: DEBUG
    org.springframework.ai: INFO
    org.springframework.web.multipart: INFO

spring:
  application:
    name: factify-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/factify
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: FactifyHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      validation-timeout: 5000

  sql:
    init:
      mode: always
      continue-on-error: false

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  ai:
    model:
      chat: google-genai
      embedding:
        text: google-genai
    google:
      genai:
        api-key: ${SPRING_AI_GOOGLE_GENAI_API_KEY}
        chat:
          model: gemini-3.1-flash-lite
          temperature: 0.1
          response-mime-type: application/json
        embedding:
          api-key: ${SPRING_AI_GOOGLE_GENAI_API_KEY}
          text:
            model: gemini-embedding-001
            task-type: FACT_VERIFICATION
            dimensions: 768
    vectorstore:
      pgvector:
        # Creates pgvector extensions, vector_store table, and index on first startup.
        initialize-schema: true
        # Keep false for first-run auto-creation; enable later after the table exists.
        schema-validation: false
        remove-existing-vector-store-table: false
        schema-name: public
        table-name: vector_store
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 768
        max-document-batch-size: 1000

factify:
  google-fact-check:
    enabled: true
    api-key: ${GOOGLE_FACT_CHECK_API_KEY:}
    language-code:
    page-size: 5
