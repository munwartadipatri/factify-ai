services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: factify-postgres
    environment:
      POSTGRES_DB: factify
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - factify-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d factify"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: factify-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/factify
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: admin
      SPRING_SQL_INIT_MODE: never
      SPRING_AI_VECTORSTORE_PGVECTOR_INITIALIZE_SCHEMA: true
      SPRING_AI_GOOGLE_GENAI_API_KEY: ${SPRING_AI_GOOGLE_GENAI_API_KEY:?Set SPRING_AI_GOOGLE_GENAI_API_KEY in .env}
      GOOGLE_FACT_CHECK_API_KEY: ${GOOGLE_FACT_CHECK_API_KEY:-}
    ports:
      - "${FACTIFY_BACKEND_PORT:-8081}:8080"

volumes:
  factify-postgres-data:
